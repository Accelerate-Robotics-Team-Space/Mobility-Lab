steps:
  - checkout: self
    persistCredentials: true

  - task: PowerShell@2
    displayName: "☑ Select Xcode Version"
    inputs:
      targetType: "inline"
      script: |
        echo Mac OS version:
        sw_vers -productVersion
        echo Installed Xcode versions:
        ls /Applications | grep 'Xcode'
        echo currently selected xcode:
        xcrun xcode-select --print-path
        echo selecting latest xcode...
        sudo xcode-select -s /Applications/Xcode_$(xcodeVersion).app
        xcrun xcode-select --print-path
        xcodebuild -version

  - task: InstallAppleCertificate@2
    displayName: "📀🔑 Install Apple Certificate"
    inputs:
      certSecureFile: "MT-distribution.p12"
      certPwd: "$(MMCertPassword)"
      keychain: "temp"

  - task: InstallAppleProvisioningProfile@1
    displayName: "📀🪪 Install Provision Profile"
    inputs:
      provisioningProfileLocation: "secureFiles"
      provProfileSecureFile: "$(UMMProfile)"
      removeProfile: true
