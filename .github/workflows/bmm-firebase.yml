name: BMM Firebase Distribution

on:
  push:
    branches: [ main, App-Behavior-and-UI-changes ]
  workflow_dispatch:

jobs:
  build-and-distribute:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26.0.1"
        
    - name: Install dependencies
      run: |
        if [ -f "Podfile" ]; then
          sudo gem install cocoapods
          pod install
        elif [ -f "Package.swift" ]; then
          echo "Using Swift Package Manager"
        fi
        
    - name: Unlock keychain
      run: |
        security unlock-keychain -p "${{ secrets.MAC_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security set-keychain-settings -t 3600 -u ~/Library/Keychains/login.keychain-db
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.MAC_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        
    - name: Resolve package dependencies
      run: |
        xcodebuild -resolvePackageDependencies \
          -workspace MobilityLab.xcworkspace \
          -scheme MobilityLab-Prod \
          -configuration Prod \
          -derivedDataPath DerivedData \
          -skipPackagePluginValidation

    - name: Build and archive MobilityLab-Prod scheme
      run: |
        xcodebuild archive \
          -workspace MobilityLab.xcworkspace \
          -scheme MobilityLab-Prod \
          -configuration Prod \
          -archivePath MobilityLab.xcarchive \
          -derivedDataPath DerivedData \
          -allowProvisioningUpdates \
          -skipPackagePluginValidation \
          CURRENT_PROJECT_VERSION="${{ github.run_number }}-PROD"

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath MobilityLab.xcarchive \
          -exportPath ./export \
          -exportOptionsPlist ExportOptions.plist
          
    - name: Install Firebase CLI
      run: npm install -g firebase-tools

    - name: Upload to Firebase App Distribution
      run: |
        IPA=$(find export -name "*.ipa" | head -1)
        echo "Uploading IPA: $IPA"
        firebase appdistribution:distribute "$IPA" \
          --app "${{ secrets.FIREBASE_APP_ID }}" \
          --token "${{ secrets.FIREBASE_TOKEN }}" \
          --groups testers \
          --release-notes "Build from commit ${{ github.sha }}"

    - name: Lock keychain
      if: always()
      run: |
        security lock-keychain ~/Library/Keychains/login.keychain-db || true