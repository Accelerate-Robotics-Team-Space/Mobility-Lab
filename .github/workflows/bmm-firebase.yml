name: BMM Firebase Distribution

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-distribute:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Install dependencies
      run: |
        if [ -f "Podfile" ]; then
          sudo gem install cocoapods
          pod install
        elif [ -f "Package.swift" ]; then
          echo "Using Swift Package Manager"
        fi
        
    - name: Create temporary keychain
      run: |
        security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        
    - name: Import certificate
      run: |
        echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
        security import certificate.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
        
    - name: Import provisioning profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/BMM.mobileprovision
        
    - name: Build and archive BMM scheme
      run: |
        xcodebuild archive \
          -workspace BMM.xcworkspace \
          -scheme BMM \
          -configuration Release \
          -archivePath BMM.xcarchive \
          -allowProvisioningUpdates
          
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath BMM.xcarchive \
          -exportPath ./export \
          -exportOptionsPlist ExportOptions.plist
          
    - name: Upload to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_TOKEN }}
        groups: testers
        file: export/BMM.ipa
        releaseNotes: "Build from commit ${{ github.sha }}"

    - name: Cleanup keychain
      if: always()
      run: |
        security delete-keychain build.keychain || true