schedules:
  - cron: "0 8 * * *"
    displayName: Daily Profile Expiry Check
    always: true

variables:
  - group: SensorSuiteBMMProd
  - group: SensorSuiteUMMProd

jobs:
  - job: CheckProfileExpiry
    displayName: "Check Provisioning Profile Expiry"
    pool:
      vmImage: "macos-15"
    steps:
      - checkout: none

      - task: DownloadSecureFile@1
        displayName: "⬇️ Download BMM Profile"
        name: bmmProfile
        inputs:
          secureFile: "$(BMMProfile)"

      - task: DownloadSecureFile@1
        displayName: "⬇️ Download Watch Profile"
        name: watchProfile
        inputs:
          secureFile: "$(WatchProfile)"

      - task: DownloadSecureFile@1
        displayName: "⬇️ Download UMM Profile"
        name: ummProfile
        inputs:
          secureFile: "$(UMMProfile)"

      - task: Bash@3
        displayName: "🔍 Check Profile Expiry"
        inputs:
          targetType: "inline"
          script: |
            profiles=(
              "$(bmmProfile.secureFilePath)"
              "$(watchProfile.secureFilePath)"
              "$(ummProfile.secureFilePath)"
            )

            TODAY=$(date +%s)
            WARN_DAYS=30
            FAIL_DAYS=7
            HAS_CRITICAL=0
            HAS_WARNING=0

            for profile in "${profiles[@]}"; do
              [ -f "$profile" ] || continue

              plist=$(security cms -D -i "$profile" 2>/dev/null)

              name=$(echo "$plist" | grep -A1 "<key>Name</key>" | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
              expiry_str=$(echo "$plist" | grep -A1 "<key>ExpirationDate</key>" | grep "<date>" | sed 's/.*<date>\(.*\)<\/date>.*/\1/')

              [ -z "$expiry_str" ] && echo "Could not read expiry for: $profile" && continue

              expiry_epoch=$(date -j -f "%Y-%m-%dT%H:%M:%SZ" "$expiry_str" +%s 2>/dev/null)
              days=$(( (expiry_epoch - TODAY) / 86400 ))

              echo "Profile: $name | Expires: $expiry_str | Days remaining: $days"

              if [ "$days" -le "$FAIL_DAYS" ]; then
                echo "##vso[task.logissue type=error]CRITICAL: '$name' expires in $days days ($expiry_str)."
                HAS_CRITICAL=1
              elif [ "$days" -le "$WARN_DAYS" ]; then
                echo "##vso[task.logissue type=warning]WARNING: '$name' expires in $days days ($expiry_str)."
                HAS_WARNING=1
              fi
            done

            # TODO: Add Teams notification via webhook
            # TODO: Add email notification via SendGrid SMTP
