# [Available Agents](https://learn.microsoft.com/en-us/azure/devops/pipelines/agents/hosted?view=azure-devops&tabs=macos-images%2Cyaml#macos-15-arm64-image-limited-public-preview-paused)
# [Deprecation Schedule](https://learn.microsoft.com/en-us/azure/devops/pipelines/agents/hosted-deprecation-schedule?view=azure-devops&tabs=macos-images#macos-14-sonoma-hosted-image-deprecation-schedule)

steps:
  - task: Bash@3
    displayName: "👥 Set Git Credentials"
    inputs:
      targetType: "inline"
      script: |
        git config --global user.name "Lift Tracker Build Service (AtlasLift)"
        git config --global user.email "corporate@atlaslifttech.com"

  - task: Bash@3
    displayName: "🍺👾 Install 'ansi tools' ¯\\_(ツ)_/¯"
    inputs:
      targetType: "inline"
      script: |
        HOMEBREW_NO_AUTO_UPDATE=1 brew install ansifilter

  - task: Bash@3
    displayName: "📀🛡️ Install Sentry CLI Tools"
    inputs:
      targetType: "inline"
      script: |
        VERSION=2.58.3

        LATEST=$(curl -I -s https://github.com/getsentry/sentry-cli/releases/latest | grep location | sed -e 's/location: https:\/\/github.com\/getsentry\/sentry-cli\/releases\/tag\///g')
        echo "Latest Version of sentry-cli: ${LATEST%?}, Installing $VERSION"
        if [[ ${LATEST%?} != $VERSION ]]; then
            echo "Consider Updating to newer version"
        else
            echo "Installing Current Version"
        fi
        curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION=$VERSION bash

  - task: Bash@3
    displayName: "📀🔥 Install Firebase CLI Tools"
    inputs:
      targetType: "inline"
      script: |
        source "$(Build.SourcesDirectory)/scripts/firebase.sh"

  - task: Bash@3
    displayName: "➕➕ Set Build Number"
    inputs:
      targetType: "inline"
      script: |
        #!/bin/bash
        NEW_VERSION="$(Build.BuildId)-$(FirGroupName)"
        cd "$(System.DefaultWorkingDirectory)"
        agvtool new-version -all "$NEW_VERSION"
        echo "Updated CURRENT_PROJECT_VERSION to $NEW_VERSION"

  - task: Bash@3
    displayName: "🏃🏻‍➡️✅ Run Tests"
    inputs:
      targetType: "inline"
      script: |
        set -e

        VER=$(/usr/bin/xcodebuild -version)
        echo "Xcodebuild Version: ${VER}"
        
        rm -rf "Report.xcresult"
        
        /usr/bin/xcodebuild \
        -showBuildTimingSummary \
        -skipPackagePluginValidation \
        -workspace $(System.DefaultWorkingDirectory)/SensorSuite.xcworkspace \
        -resultBundlePath "$(System.DefaultWorkingDirectory)/Report.xcresult" \
        -scheme "$(testScheme)" \
        -destination "platform=$(testPlatform)" \
        test \
        | tee "xcodebuild-tests.log" \
        | xcbeautify
        
        set +e

        zip -rq testReport.xcresult.zip Report.xcresult

        $(Build.SourcesDirectory)/scripts/xcresultparser \
        --summary-fields 'tests|failed|skipped|duration|date' \
        Report.xcresult \
        >> report.txt
        
        $(Build.SourcesDirectory)/scripts/xcresultparser \
        --output-format cobertura \
        Report.xcresult \
        >> cobertura.xml

        arr=$(egrep -o 'line-rate="[^\"]+"' cobertura.xml | cut -d'"' -f2)
        sum=$(IFS=+; echo "0 + ${arr[*]}" | bc | head -1)
        coverage=$(echo "scale=2; $sum * 100.0" | bc)
        COVERAGE=$(printf "%.2f" "$coverage")

        zip -q cobertura.zip cobertura.xml
        zip -q xcodebuild-tests.log.zip xcodebuild-tests.log
        echo ""
        echo "[1;93mTesting completed[0;0m"
        echo ""
        echo "[1;93mCode Coverage: ${COVERAGE} %[0;0m"
        cat report.txt

        cp report.txt report.raw.txt
        ansifilter --text report.txt > testReport.txt

        sed -i '' "s/✓/YY/g" report.txt
        sed -i '' "s/✖︎/XX/g" report.txt

        ansifilter --html report.txt > testReport.html

        sed -i '' "s/YY/\&#10004;/g" testReport.html
        sed -i '' "s/XX/\&#10006;/g" testReport.html
        sed -i '' "s/Users.runner.work.1.s.//g" cobertura.xml
        echo "##vso[task.setvariable variable=CODE_COVER;]${COVERAGE}"

        # Update HTML file
        # replace existing "font-family: 'Courier New'" with: 
        CSS="font-family:'Fira Code', 'SP Mono', 'Consolas', 'Noto Sans Mono', 'Courier New', monospace"
        sed -i '' "s/font-family: \"Courier New\"/${CSS}/g" testReport.html

        # insert next line after '<body>':
        DIV="<div style=\"font-family:'Fira Code', 'SP Mono', Consolas, 'Noto Sans Mono', 'Courier New', monospace;\
        font-weight:bold;color:#000045;\"><p style=\"font-size:x-large;margin-bottom:0;\">Code Coverage</p>\
        <p style=\"font-size:larger;padding-left:1em;margin-top:0;\">$COVERAGE%</p></div>"

        CMD="sed -i '' \"s|<body>|<body>\\n\$DIV|\" testReport.html"
        eval $CMD

  - task: Bash@3
    displayName: "✅📃 Test Results"
    inputs:
      targetType: "inline"
      script: |
        echo ""
        echo ""
        echo "[1;93mCode Coverage: ${CODE_COVER}%[0;0m"
        cat "$(System.DefaultWorkingDirectory)/report.raw.txt"

  - task: Bash@3
    displayName: "🛠️👷‍♂️🗄️ Build Archive"
    inputs:
      targetType: "inline"
      script: |
        set -e

        VER=$(/usr/bin/xcodebuild -version)
        echo "Xcodebuild Version: ${VER}"
        
        /usr/bin/xcodebuild \
        -skipPackagePluginValidation \
        -showBuildTimingSummary \
        -workspace $(System.DefaultWorkingDirectory)/SensorSuite.xcworkspace \
        -scheme "$(Scheme)" \
        -archivePath "SensorSuite" \
        archive \
        | tee "xcodebuild.log" \
        | xcbeautify

        set +e
        zip -r xcodebuild.log.zip xcodebuild.log
        rm -f xcodebuild.log
    env:
      SENTRY_AUTH_TOKEN: $(SENTRY_AUTH_TOKEN)

  - task: Bash@3
    displayName: "🗄️📲 Export Archive"
    inputs:
      targetType: "inline"
      script: |
        set -e

        # Export.
        /usr/bin/xcodebuild \
        -exportArchive \
        -archivePath SensorSuite.xcarchive \
        -exportOptionsPlist $(ExportOptions) \
        -exportPath output/
 
        # Delete temp files.
        rm -rf $TASK_TMP_DIR

  - task: CopyFiles@2
    displayName: "⿻🏺 Copy Artifacts"
    inputs:
      SourceFolder: "$(system.defaultworkingdirectory)"
      Contents: "**/?(*.ipa|Packaging.log|*.zip|testReport.*)"
      TargetFolder: "$(build.artifactstagingdirectory)"
      CleanTargetFolder: true
      OverWrite: true
      flattenFolders: true

  - task: PublishBuildArtifacts@1
    displayName: "📰🏺 Publish Artifacts"
    inputs:
      PathtoPublish: "$(Build.ArtifactStagingDirectory)"
      ArtifactName: "drop"
      publishLocation: "Container"

  - task: DownloadBuildArtifacts@1
    displayName: "📰🏺 Download Artifacts"
    inputs:
      buildType: 'current'
      downloadType: 'single'
      artifactName: 'drop'
      downloadPath: '$(System.ArtifactsDirectory)'

  - task: CmdLine@2
    displayName: "📜🏺 List Artifacts"
    inputs:
      script: |
        echo "Listing files in $(System.ArtifactsDirectory):"
        ls "$(System.ArtifactsDirectory)"
        LISTING=$(ls "$(System.ArtifactsDirectory)")
        echo "LISTING: ${LISTING}"

        # find listing with '.ipa' extension
        IPA=$(echo "$LISTING" | grep '.ipa$')

        echo "IPA File: ${IPA}"
        echo "##vso[task.setvariable variable=IPA_FILE;]${IPA}"

  - task: PublishCodeCoverageResults@2
    displayName: "📝🎯 Publish Code Coverage"
    inputs:
      summaryFileLocation: "$(System.DefaultWorkingDirectory)/cobertura.xml"
      failIfCoverageEmpty: false

  - task: CmdLine@2
    displayName: "🚛🔥 Deploy IPA to Firebase"
    inputs:
      script: |
        firebase appdistribution:distribute *.ipa \
        --app "$(FirAppId)" \
        --token "$(FirebaseToken)" \
        --groups "$(FirGroupName)" \
        --release-notes "Firebase distribution test"
      workingDirectory: "$(build.artifactStagingDirectory)"

  - task: Bash@3
    displayName: "#️🫯 Get App Version (Prod)"
    condition: or(eq(variables['FirGroupName'], 'PROD'), eq(variables['FirGroupName'], 'PROD-INT'))
    inputs:
      targetType: "inline"
      script: |
        # set -e
        # set -o pipefail
        echo "$APP_VERSION"
        BUILD_SCHEME="$(Scheme)" 
        echo "Build Scheme: ${BUILD_SCHEME}"
        # SensorSuite-Qa, SensorSuite-Test, SensorSuite-Prod
        # SensorSuiteUMM-Qa, SensorSuiteUMM-Test, SensorSuiteUMM-Prod (Legacy or Integrated)
        IFS="-" read -ra ARRAY <<< "${BUILD_SCHEME}"
        LAST_INDEX=$((${#ARRAY[@]} - 1))
        # 'SensorSuite' or 'SensorSuiteUMM'
        PROJECT="${ARRAY[0]}"
        echo "Project: ${PROJECT}"

        # Qa, Test, or Prod
        LAST_ELEM="${ARRAY[LAST_INDEX]}"
        echo "Build Level: ${LAST_ELEM}"

        # Change from Qa to Prod
        echo "Getting build version from xcodebuild"

        /usr/bin/xcodebuild \
        -showBuildSettings \
        -json \
        -skipPackagePluginValidation \
        -workspace $(System.DefaultWorkingDirectory)/SensorSuite.xcworkspace \
        -scheme "$(Scheme)" \
        -destination "platform=$(testPlatform)" \
        | tee "settings.json" \

        VERSION=$(jq -r '.[].buildSettings.MARKETING_VERSION' < settings.json)
        echo "VERSION: $VERSION"
        echo "##vso[task.setvariable variable=APP_VERSION;]${VERSION}"

  - task: Bash@3
    displayName: "🔖 Git Tag"
    inputs:
      targetType: "inline"
      script: |
        # set -e
        # set -o pipefail
        BUILD_SCHEME="$(Scheme)"
        GROUP="$(FirGroupName)"
        GROUP_SUFFIX=${GROUP: -3}
        if [[ "$GROUP_SUFFIX" == "INT" ]]; then
          IS_INT=true
        else
          IS_INT=false
        fi
        echo "Group: $GROUP, Is INT: $IS_INT"

        echo "Build Scheme: ${BUILD_SCHEME}"
        # SensorSuite-Qa, SensorSuite-Test, SensorSuite-Prod
        # SensorSuiteUMM-Qa, SensorSuiteUMM-Test, SensorSuiteUMM-Prod (Legacy or Integrated)
        IFS="-" read -ra ARRAY <<< "${BUILD_SCHEME}"
        LAST_INDEX=$((${#ARRAY[@]} - 1))
        # 'SensorSuite' or 'SensorSuiteUMM'
        PROJECT="${ARRAY[0]}"
        echo "Project: ${PROJECT}"

        # Qa, Test, or Prod
        LAST_ELEM="${ARRAY[LAST_INDEX]}"
        echo "Build Level: ${LAST_ELEM}"

        BUILD=$(Build.BuildId)
        echo "Build: ${BUILD}"
        SUFFIX=""
        if [[ "$(productType)" == "UMM" ]]; then
          echo "UMM Tag"
          # BUILD="$(Build.BuildId)-UMM"
          if $IS_INT; then
            SUFFIX=" UMM-INT"
          else
            SUFFIX=" UMM"
          fi
        fi

        # Assign environment variable to local variable
        FILE="$(IPA_FILE)"
        # echo "File: ${FILE}"

        # Split into an array using parentheses for array assignment. Uses space as delimiter
        # e.g. "SensorSuite BMM.QA.1.0.113.0.ipa" -> ("SensorSuite" "BMM.QA.1.0.113.0.ipa")
        IFS=' '
        ARR=( $FILE )
        LAST_INDEX=$((${#ARR[@]} - 1))
        # Get last part of filename 
        # e.g. "BMM.QA.1.0.113.0.ipa"
        IPA_FILE="${ARR[$LAST_INDEX]}"
        # echo "IPA: $IPA_FILE"

        # Trim last 4 chars (".ipa")
        # "BMM.QA.1.0.113.0.ipa" -> "BMM.QA.1.0.113.0"
        # For production, this will be "BMM" only
        IPALAST=${IPA_FILE%????}

        # echo "IPA (no extension): $IPALAST"
        
        if [[ $GROUP == "PROD" ]]; then
            TAG="$(productType).PROD.$APP_VERSION($BUILD)"
        elif [[ $GROUP == "PROD-INT" ]]; then
            TAG="$(productType).PROD.$APP_VERSION($BUILD)-INT"
        elif $IS_INT; then
            TAG="$IPALAST($BUILD)-INT"
        else
            TAG="$IPALAST($BUILD)"
        fi
        echo "Tag: ${TAG}"

        # Break apart filename at '.'
        IFS='.' read -r -a ARRAY3 <<< "$IPALAST"
        LAST_INDEX=$((${#ARRAY3[@]} - 1))

        SEMANTIC_OUT=""
        for index in "${!ARRAY3[@]}"; do
          input="${ARRAY3[$index]}"
          if [[ "$input" =~ ^[0-9]+$ ]]; then
            SEMANTIC_OUT="${SEMANTIC_OUT}.${ARRAY3[$index]}"
          fi
        done
        # remove leading '.' (first char)
        SEMANTIC="${SEMANTIC_OUT:1}"
        if [[ $GROUP == "PROD" || $GROUP == "PROD-INT" ]]; then
            SEMANTIC="$APP_VERSION"
        fi
        echo "Semantic Version: ${SEMANTIC}"

        MESSAGE=""
        if [[ $LAST_ELEM == "Qa" ]]; then
          echo "'QA' Build Scheme Detected"
          git tag "${TAG}"
        elif [[ $LAST_ELEM == "Test" ]]; then
          echo "'Test' Build Scheme Detected"
          git tag -a "${TAG}" -m "$SEMANTIC ($(Build.BuildId)-TEST)${SUFFIX}"
          MESSAGE="$SEMANTIC ($(Build.BuildId)-TEST)${SUFFIX}"
        elif [[ $LAST_ELEM == "Prod" ]]; then
          echo "'Production' Build Scheme Detected"
          git tag -a "${TAG}" -m "$SEMANTIC ($(Build.BuildId)-PROD)${SUFFIX}"
          MESSAGE="$SEMANTIC ($(Build.BuildId)-PROD)${SUFFIX}"
        else
          echo "Unknown Build Scheme"
          git tag "${TAG}"
        fi
        echo "Pushing Tag: ${TAG} ${MESSAGE}"
        git push origin --tags
        echo "##vso[task.setvariable variable=APP_VERSION;]${SEMANTIC}"

  - task: Bash@3
    displayName: "🗑️🔖 Prune Git Tags"
    inputs:
      targetType: "inline"
      script: |
        # Prune QA tags from more than 2 months ago, that aren't the current version
        # https://gist.github.com/yan-foto/c1f57bf1fe4f63d4f674d98e96e23730

        dateCmd='date -jf "%Y-%m-%d" +%s'
        delRemoteCmd='git push --delete origin'
        delLocalCmd='git fetch --prune origin "+refs/tags/*:refs/tags/*"'

        # Get Date for 2 months ago in format "YYYY-MM-dd"
        userDate=$(date -v -2m +%F)

        autoPage() {
            input=$(cat -)
            input_lines=$(echo "$input" | grep -c .)
            if [[ "$input_lines" -gt "$LINES" ]]; then
                echo "$input" | ${PAGER:-less}
            else
                echo "$input"
            fi
        }

        # User given date to epoch timestamp
        userTS=`eval "$dateCmd $userDate"`

        currentVersion="$APP_VERSION"
        
        IFS='.' read -r -a ARRAY <<< "$currentVersion"

        SEMANTIC_OUT=""
        for index in "${!ARRAY[@]}"; do
          input="${ARRAY[$index]}"
          if [[ "$input" =~ ^[0-9]+$ ]]; then
            number="${ARRAY[$index]}"
            if [[ index -eq 2 ]]; then
                echo "Index $index"
                number=$((number - 1))
            fi
            SEMANTIC_OUT="${SEMANTIC_OUT}.$number"
          fi
        done
        # remove leading '.' (first char)
        previousVersion="${SEMANTIC_OUT:1}"

        echo "Prune QA tags from before $userDate, that aren't the current version ($currentVersion), or previous ($previousVersion)"
        echo ""

        git for-each-ref --sort=taggerdate --format 'TAG="%(refname:short)"; DATE="%(taggerdate:short)"' refs/tags |
        {
            # Array of matching tags
            tags=()

            echo "Finding matching tags..."
            while read entry; do
                eval "$entry"
                if [ -z "$DATE" ]; then
                    DATE=$(date -v -3m +%F)
                fi
                tagTS=`eval "$dateCmd $DATE"`
                
                if [[ $userTS -ge $tagTS && "$TAG" == *"QA"* && "$TAG" != *"$currentVersion"* && "$TAG" != *"$previousVersion"* ]]; then
                    # echo "Adding Tag for $DATE: $TAG"
                    tags[${#tags[*]}]="$TAG"
                fi
            done
            
            # If no tags has been found just exit!
            if [ ${#tags[@]} -eq 0 ]
            then
                echo "No matching tags found. Quitting!"
                exit 0
            fi

            echo "Following tags will be removed"
            printf "%s\n" "${tags[@]}"
            echo ""
            echo "Removing remote tags..."
            eval '$delRemoteCmd "${tags[@]}"'
            echo "Removing Local tags..."
            eval 'git tag -d "${tags[@]}"'
            echo "Purging local tags..."
            eval "$delLocalCmd"
        }

        exit 0
